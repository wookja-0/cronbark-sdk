name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package (editable)
        run: pip install -e .

      - name: Install dev tools
        run: pip install ruff pytest build

      - name: Lint (ruff) — non-blocking
        run: ruff check . || echo "::warning::ruff found issues (non-blocking for initial release)"

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            pytest -v
          else
            echo "No tests/ directory — skipping pytest"
          fi

      - name: Build distribution
        run: python -m build

      - name: Verify dist artifacts
        run: ls -la dist/
